<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Autonomie numérique, emploi et français | Exercices gratuits</title>
  <meta name="description" content="Plateforme d'exercices progressifs pour apprendre le numérique, la bureautique, le français pratique et les démarches d'emploi: clavier, souris, CV, e-mails, Google Docs, Excel et ORP.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://alexishoppeler-bot.github.io/alexis.hoppeler/games/accueil.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Autonomie numérique, emploi et français | Exercices gratuits">
  <meta property="og:description" content="Plateforme d'exercices progressifs pour apprendre le numérique, la bureautique, le français pratique et les démarches d'emploi: clavier, souris, CV, e-mails, Google Docs, Excel et ORP.">
  <meta property="og:image" content="https://alexishoppeler-bot.github.io/alexis.hoppeler/assets/logo.png">
  <meta property="og:locale" content="fr_CH">
<link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages/accueil.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Autonomie numérique",
    "inLanguage": "fr-CH",
    "description": "Exercices progressifs pour apprendre le numérique, la bureautique, le français pratique et les démarches d'emploi.",
    "educationalLevel": "Débutant",
    "learningResourceType": "Exercices interactifs",
    "audience": {
      "@type": "EducationalAudience",
      "educationalRole": "Apprenant adulte"
    }
  }
  </script>
</head>
<body>
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="layout">
    <main class="main">
      <div class="container accueil-minimal">
        <section class="welcome-start fade-up" aria-labelledby="welcomeTitle">
          <div class="welcome-copy">
            <p class="welcome-kicker">Autonomie numérique</p>
            <h1 id="welcomeTitle">Commencer l’entraînement</h1>
          </div>
          <a class="welcome-start-button" id="startExerciseButton" href="souris-cible.html">Commencer</a>
        </section>

      </div>
    </main>
    <div id="footer-slot"></div>
  </div>

  <script src="../js/score.js"></script>
  <script src="../js/exercises-config.js"></script>
  <script src="../js/stages.js"></script>
  <script src="../js/exercise-utils.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    'use strict';

    document.addEventListener('DOMContentLoaded', function () {
      const button = document.getElementById('startExerciseButton');
      const config = window.EXERCISE_CONFIG || {};
      const meta = config.meta || {};
      const order = [
        'souris-cible',
        'clavier',
        'copier-coller',
        'formulaire',
        'email-ecrire',
        'email-pro'
      ];
      if (!button) return;

      const nextPage = order.find(function (page) {
        return !window.ScoreManager || window.ScoreManager.readMetrics(page).status !== 'completed';
      }) || order[0];
      const nextMeta = meta[nextPage] || {};
      button.href = nextMeta.href || (nextPage + '.html');
      button.textContent = nextPage === order[0]
        ? 'Commencer'
        : 'Continuer avec ' + (nextMeta.name || 'le prochain exercice');
    });
  </script>

</body>
</html>
