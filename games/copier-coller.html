<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copier-coller | Exercice autonomie numérique</title>
  <meta name="description" content="Copier des phrases complètes ou des mots sélectionnés et les coller exactement.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://alexishoppeler-bot.github.io/alexis.hoppeler/games/copier-coller.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Copier-coller | Exercice autonomie numérique">
  <meta property="og:description" content="Copier des phrases complètes ou des mots sélectionnés et les coller exactement.">
  <meta property="og:image" content="https://alexishoppeler-bot.github.io/alexis.hoppeler/assets/logo.png">
  <meta property="og:locale" content="fr_CH">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages/copier-coller.css">
</head>
<body>
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="layout">
    <main class="main">
      <div class="container">

        <div class="page-header fade-up">
          <div class="page-icon">📋</div>
          <div>
            <h1>Copier-coller</h1>
            <p id="page-subtitle">Sélectionne le texte, copie avec <strong>Ctrl+C</strong>, colle avec <strong>Ctrl+V</strong>.</p>
          </div>
        </div>

        <!-- Sélecteur de mode -->
        <div class="cc-mode-bar fade-up delay-1">
          <button class="cc-mode-btn active" id="btn-mode-phrase" type="button">📋 Phrase entière</button>
          <button class="cc-mode-btn" id="btn-mode-mots" type="button">✂️ Mots précis</button>
        </div>

        <!-- Progression -->
        <div class="card mb-16 cc-progress-card fade-up delay-1" id="progress-card">
          <div class="quiz-top">
            <div class="quiz-progress-label">
              Progression <strong id="qNum">1</strong> / <strong id="qTotal">0</strong>
            </div>
            <div class="progress-percent-wrap">
              <span id="prog-pct">0%</span>
            </div>
          </div>
          <div class="series-progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          </div>
        </div>

        <!-- Zone d'exercice -->
        <div class="exercise-zone cc-zone fade-up delay-2">

          <div class="cc-source-label" id="cc-source-label">
            Copie ce texte &nbsp;<kbd>Ctrl+C</kbd>&nbsp; puis colle-le dans la zone ci-dessous &nbsp;<kbd>Ctrl+V</kbd>
          </div>

          <!-- Consigne mots (cachée en mode phrase) -->
          <div class="cc-words-instruction hidden" id="cc-words-instruction"></div>

          <div class="cc-source" id="cc-source" tabindex="0"></div>

          <textarea class="cc-answer" id="cc-answer"
            placeholder="Colle le texte ici avec Ctrl+V..."
            autocomplete="off" autocorrect="off" spellcheck="false"></textarea>

          <div class="feedback-text" id="feedback-text">&nbsp;</div>

          <div class="cc-actions">
            <button class="btn btn-ghost btn-sm" id="btn-select-all" type="button">Tout sélectionner</button>
            <button class="btn btn-ghost btn-sm" id="btn-skip" type="button">Passer</button>
            <button class="btn btn-primary" id="btn-verify" type="button">Vérifier</button>
          </div>

        </div>

        <!-- KPI -->
        <div class="kpi-grid fade-up delay-2">
          <div class="kpi-card">
            <div class="kpi-val kpi-val-success" id="sc-correct">0</div>
            <div class="kpi-lbl">Correctes</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-val kpi-val-danger" id="sc-errors">0</div>
            <div class="kpi-lbl">Erreurs</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-val" id="sc-xp">0 XP</div>
            <div class="kpi-lbl">XP gagné</div>
          </div>
        </div>

      </div>
    </main>
    <div id="footer-slot"></div>
  </div>

  <!-- Modal fin mode phrase -->
  <div class="modal-overlay" id="modal-phrase">
    <div class="modal">
      <div class="modal-icon">🎉</div>
      <div class="modal-title">Phrases copiées !</div>
      <div class="modal-text" id="modal-phrase-subtitle"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-goto-mots" type="button">Essaie les mots précis ✂️</button>
        <button class="btn btn-secondary" id="modal-phrase-restart" type="button">Rejouer</button>
        <a href="accueil.html" class="btn btn-secondary">← Accueil</a>
      </div>
    </div>
  </div>

  <!-- Modal fin mode mots -->
  <div class="modal-overlay" id="modal-mots">
    <div class="modal">
      <div class="modal-icon">🎉</div>
      <div class="modal-title">Exercice terminé !</div>
      <div class="modal-text" id="modal-mots-subtitle"></div>
      <div class="modal-actions">
        <a href="formulaire.html" class="btn btn-primary" id="btnNextExercise">Continuer →</a>
        <button class="btn btn-secondary" id="modal-mots-restart" type="button">Rejouer</button>
        <a href="accueil.html" class="btn btn-secondary">← Accueil</a>
      </div>
    </div>
  </div>

  <script src="../js/score.js"></script>
  <script src="../js/exercises-config.js"></script>
  <script src="../js/stages.js"></script>
  <script src="../js/exercise-utils.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/ui.js"></script>
  <script>
  'use strict';

  /* ── Données ── */
  const PHRASES = [
    "Bonjour, je m'appelle Maria.",
    "Je cherche un emploi à Lausanne.",
    "Mon numéro de téléphone est 076 123 45 67.",
    "J'habite à Vevey.",
    "Je suis disponible le lundi matin.",
    "Madame, Monsieur,",
    "Je vous remercie pour votre réponse.",
    "Mes salutations distinguées.",
    "Je souhaite postuler pour ce poste.",
    "Je suis motivé et sérieux.",
    "Je parle français niveau A1.",
    "J'ai de l'expérience dans le nettoyage.",
    "Je peux commencer rapidement.",
    "Pouvez-vous me donner un rendez-vous ?",
    "Voici mon curriculum vitae.",
    "Je reste à votre disposition.",
    "Objet : Candidature spontanée",
    "Je cherche un stage dans la vente.",
    "Merci pour votre compréhension.",
    "Avec mes meilleures salutations."
  ];

  const MOTS = [
    { text: "Bonjour je m'appelle Maria",                       target: "Maria",                        instruction: "Copie le prénom." },
    { text: "J'habite à Vevey en Suisse",                       target: "Vevey Suisse",                 instruction: "Copie la ville et le pays." },
    { text: "Je cherche un emploi dans le nettoyage",           target: "emploi nettoyage",             instruction: "Copie le type de recherche et le domaine." },
    { text: "Je suis disponible lundi matin",                   target: "lundi matin",                  instruction: "Copie le jour et le moment." },
    { text: "Je parle français et portugais",                   target: "français portugais",           instruction: "Copie les deux langues." },
    { text: "Mon téléphone est 076 123 45 67",                  target: "076 123 45 67",                instruction: "Copie le numéro de téléphone." },
    { text: "Je suis motivé sérieux et ponctuel",               target: "motivé sérieux ponctuel",      instruction: "Copie les trois qualités." },
    { text: "Je prends le train à Lausanne",                    target: "train Lausanne",               instruction: "Copie le transport et la ville." },
    { text: "J'ai rendez-vous mardi à 10 heures",               target: "mardi 10 heures",              instruction: "Copie le jour et l'heure." },
    { text: "Je cherche une place d'apprentissage dans la vente", target: "place d'apprentissage vente", instruction: "Copie la recherche et le domaine." },
    { text: "Je travaille le matin et l'après-midi",            target: "matin l'après-midi",           instruction: "Copie les moments de la journée." },
    { text: "Merci pour votre réponse rapide",                  target: "Merci réponse",                instruction: "Copie le remerciement et le mot important." },
    { text: "Je reste à votre disposition",                     target: "votre disposition",            instruction: "Copie les deux derniers mots." },
    { text: "Voici mon curriculum vitae",                       target: "curriculum vitae",             instruction: "Copie les mots du CV." },
    { text: "Madame Monsieur je vous écris",                    target: "Madame Monsieur",              instruction: "Copie les formules de politesse." },
    { text: "Je peux commencer rapidement",                     target: "commencer rapidement",         instruction: "Copie l'action et le moment." },
    { text: "Je suis inscrit au chômage",                       target: "inscrit chômage",              instruction: "Copie les mots administratifs." },
    { text: "Je postule comme aide de cuisine",                 target: "aide cuisine",                 instruction: "Copie le métier." },
    { text: "Je suis disponible le mardi et le jeudi",          target: "mardi jeudi",                  instruction: "Copie les deux jours." },
    { text: "Avec mes meilleures salutations",                  target: "meilleures salutations",       instruction: "Copie la formule de fin." }
  ];

  /* ── État ── */
  let mode = 'phrase'; // 'phrase' | 'mots'
  let idx = 0;
  let totalCorrect = 0, totalErrors = 0, totalXP = 0;

  const sourceEl      = document.getElementById('cc-source');
  const answerEl      = document.getElementById('cc-answer');
  const feedbackEl    = document.getElementById('feedback-text');
  const instrMotsEl   = document.getElementById('cc-words-instruction');
  const sourceLabelEl = document.getElementById('cc-source-label');

  function normalize(s) { return s.trim().replace(/\s+/g, ' '); }
  function normWords(s) { return s.toLowerCase().replace(/[.,;:!?]/g,'').trim().split(/\s+/).filter(Boolean); }

  /* ── Charger un exercice ── */
  function loadExercise() {
    answerEl.value = '';
    answerEl.classList.remove('correct', 'wrong');
    feedbackEl.textContent = ' ';
    feedbackEl.className = 'feedback-text';

    if (mode === 'phrase') {
      const text = PHRASES[idx];
      sourceEl.textContent = text;
      instrMotsEl.classList.add('hidden');
      sourceLabelEl.textContent = '';
      sourceLabelEl.innerHTML = 'Copie ce texte &nbsp;<kbd>Ctrl+C</kbd>&nbsp; puis colle-le ci-dessous &nbsp;<kbd>Ctrl+V</kbd>';
      answerEl.placeholder = 'Colle la phrase ici avec Ctrl+V...';
    } else {
      const ex = MOTS[idx];
      sourceEl.textContent = ex.text;
      instrMotsEl.classList.remove('hidden');
      instrMotsEl.innerHTML = ex.instruction + ' <span class="cc-target">' + escapeHtml(ex.target) + '</span>';
      sourceLabelEl.innerHTML = 'Sélectionne seulement les mots demandés &nbsp;<kbd>Ctrl+C</kbd>&nbsp; puis colle &nbsp;<kbd>Ctrl+V</kbd>';
      answerEl.placeholder = 'Colle les mots ici avec Ctrl+V...';
    }

    updateProgress();
    answerEl.focus();
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
  }

  /* ── Progression ── */
  function updateProgress() {
    const total = mode === 'phrase' ? PHRASES.length : MOTS.length;
    document.getElementById('qNum').textContent         = idx + 1;
    document.getElementById('qTotal').textContent       = total;
    const pct = Math.round(idx / total * 100);
    document.getElementById('prog-pct').textContent     = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('sc-correct').textContent   = totalCorrect;
    document.getElementById('sc-errors').textContent    = totalErrors;
    document.getElementById('sc-xp').textContent        = totalXP + ' XP';
  }

  /* ── Vérification ── */
  function verify() {
    const given = normalize(answerEl.value);
    let ok = false;

    if (mode === 'phrase') {
      ok = (given === normalize(PHRASES[idx]));
      if (ok) {
        totalCorrect++; totalXP += 2;
        recordExerciseProgress('copier-coller', { correct: 1, typed: 1, errors: 0, xp: 2 });
      } else {
        totalErrors++;
        recordExerciseProgress('copier-coller', { correct: 0, typed: 1, errors: 1, xp: 0 });
      }
    } else {
      const userW = normWords(given);
      const expW  = normWords(MOTS[idx].target);
      ok = [...userW].sort().join('|') === [...expW].sort().join('|');
      if (ok) {
        totalCorrect++; totalXP += 3;
        recordExerciseProgress('copier-mots', { correct: 1, typed: 1, errors: 0, xp: 3 });
      } else {
        totalErrors++;
        recordExerciseProgress('copier-mots', { correct: 0, typed: 1, errors: 1, xp: 0 });
      }
    }

    answerEl.classList.toggle('correct',  ok);
    answerEl.classList.toggle('wrong',   !ok);

    if (ok) {
      feedbackEl.textContent = '✅ Parfait !';
      feedbackEl.className   = 'feedback-text ok';
      setTimeout(nextExercise, 900);
    } else {
      const hint = !given
        ? 'Tu n\'as rien collé.'
        : mode === 'mots'
          ? 'Vérifie que tu as sélectionné les bons mots.'
          : 'Vérifie les accents, la ponctuation et les espaces.';
      feedbackEl.textContent = '❌ ' + hint;
      feedbackEl.className   = 'feedback-text err';
    }
    updateProgress();
  }

  /* ── Avancer ── */
  function nextExercise() {
    idx++;
    const total = mode === 'phrase' ? PHRASES.length : MOTS.length;
    if (idx >= total) { finish(); return; }
    loadExercise();
  }

  /* ── Fin de mode ── */
  function finish() {
    const acc = mode === 'phrase' ? PHRASES.length : MOTS.length;
    const pctAcc = Math.round(totalCorrect / acc * 100);

    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('prog-pct').textContent = '100%';

    if (mode === 'phrase') {
      promoteExerciseStatus('copier-coller', 'completed');
      document.getElementById('modal-phrase-subtitle').textContent =
        totalCorrect + ' correctes · ' + totalErrors + ' erreurs · ' + totalXP + ' XP';
      document.getElementById('modal-phrase').classList.add('show');
    } else {
      promoteExerciseStatus('copier-mots', 'completed');
      document.getElementById('modal-mots-subtitle').textContent =
        totalCorrect + ' correctes · ' + totalErrors + ' erreurs · ' + totalXP + ' XP';
      document.getElementById('modal-mots').classList.add('show');
    }

    if (pctAcc >= 80) launchConfetti();
  }

  /* ── Changer de mode ── */
  function setMode(newMode) {
    mode = newMode;
    idx = 0; totalCorrect = 0; totalErrors = 0; totalXP = 0;

    document.getElementById('btn-mode-phrase').classList.toggle('active', mode === 'phrase');
    document.getElementById('btn-mode-mots').classList.toggle('active', mode === 'mots');

    promoteExerciseStatus(mode === 'phrase' ? 'copier-coller' : 'copier-mots', 'in_progress');
    loadExercise();
  }

  /* ── Sélection auto ── */
  function selectSource() {
    const range = document.createRange();
    range.selectNodeContents(sourceEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    const text = mode === 'phrase' ? PHRASES[idx] : MOTS[idx].text;
    navigator.clipboard.writeText(text).catch(() => {});
  }

  /* ── Boot ── */
  document.addEventListener('DOMContentLoaded', () => {
    setupNextExerciseButton('copier-coller');
    promoteExerciseStatus('copier-coller', 'in_progress');
    setMode('phrase');

    document.getElementById('btn-mode-phrase').addEventListener('click', () => setMode('phrase'));
    document.getElementById('btn-mode-mots').addEventListener('click', () => setMode('mots'));

    document.getElementById('btn-select-all').addEventListener('click', selectSource);
    document.getElementById('btn-skip').addEventListener('click', () => {
      totalErrors++;
      recordExerciseProgress(mode === 'phrase' ? 'copier-coller' : 'copier-mots', { correct: 0, typed: 1, errors: 1, xp: 0 });
      updateProgress();
      nextExercise();
    });
    document.getElementById('btn-verify').addEventListener('click', verify);

    document.getElementById('btn-goto-mots').addEventListener('click', () => {
      document.getElementById('modal-phrase').classList.remove('show');
      setMode('mots');
    });
    document.getElementById('modal-phrase-restart').addEventListener('click', () => {
      document.getElementById('modal-phrase').classList.remove('show');
      setMode('phrase');
    });
    document.getElementById('modal-mots-restart').addEventListener('click', () => {
      document.getElementById('modal-mots').classList.remove('show');
      setMode('mots');
    });

    answerEl.addEventListener('paste', () => setTimeout(verify, 60));
  });
  </script>
</body>
</html>
