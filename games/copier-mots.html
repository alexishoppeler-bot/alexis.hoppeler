<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Copier plusieurs mots | Exercice autonomie numérique</title>
  <meta name="description" content="Sélectionner seulement les mots demandés dans une phrase puis les coller.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://alexishoppeler-bot.github.io/alexis.hoppeler/games/copier-mots.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Copier plusieurs mots | Exercice autonomie numérique">
  <meta property="og:description" content="Sélectionner seulement les mots demandés dans une phrase puis les coller.">
  <meta property="og:image" content="https://alexishoppeler-bot.github.io/alexis.hoppeler/assets/logo.png">
  <meta property="og:locale" content="fr_CH">
<link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <style>
    body.copy-words-page{background:#f3f4f6;color:#111827}
    .cw-main{max-width:1120px}
    .cw-hero{background:#1f2937;color:white;border-radius:18px;padding:24px;text-align:center;margin-bottom:20px;box-shadow:0 10px 26px rgba(15,23,42,.16)}
    .cw-hero h1{margin:0 0 8px;font-family:var(--font-head);font-size:clamp(30px,4vw,42px)}
    .cw-hero p{margin:0;color:#cbd5e1;font-size:18px}
    .cw-intro,.cw-exercise{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .cw-intro{font-size:18px;line-height:1.6}
    .cw-toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
    .cw-button{border:0;border-radius:12px;padding:12px 16px;font-size:16px;cursor:pointer;background:#2563eb;color:white;font-weight:800}
    .cw-button:hover{background:#1d4ed8}.cw-button.secondary{background:#4b5563}.cw-button.secondary:hover{background:#374151}
    .cw-exercise h2{margin-top:0;color:#1f2937;font-family:var(--font-head);font-size:22px}
    .cw-instruction{font-size:17px;margin-bottom:12px;color:#374151}
    .cw-target{background:#fef3c7;padding:4px 8px;border-radius:8px;font-weight:800;color:#92400e}
    .cw-source{background:#eef2ff;border:2px dashed #6366f1;border-radius:12px;padding:18px;font-size:24px;line-height:1.6;margin:14px 0;user-select:text;cursor:text}
    .cw-source::selection{background:#facc15;color:#111827}
    .cw-answer{width:100%;min-height:80px;border:2px solid #d1d5db;border-radius:12px;padding:14px;font-size:20px;resize:vertical}
    .cw-answer.correct{border-color:#15803d;background:#f0fdf4}.cw-answer.wrong{border-color:#b91c1c;background:#fef2f2}
    .cw-answer:focus{outline:none;border-color:#2563eb}
    .cw-result{margin-top:10px;font-weight:800;font-size:16px}.cw-result.ok{color:#15803d}.cw-result.no{color:#b91c1c}
    .cw-hint{background:#fef3c7;color:#92400e;border-radius:12px;padding:10px 12px;margin-top:10px;font-size:15px}
  </style>
</head>
<body class="copy-words-page">
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>
  <div class="layout">
    <main class="main cw-main">
      <section class="cw-hero">
        <h1>Copier-coller plusieurs mots</h1>
        <p>Sélectionner seulement les bons mots.</p>
      </section>
      <section class="cw-intro">
        <strong>Consigne :</strong><br>
        1. Lisez la phrase.<br>
        2. Sélectionnez seulement les mots demandés avec la souris.<br>
        3. Faites <strong>Ctrl + C</strong>, puis <strong>Ctrl + V</strong> dans la zone blanche.<br>
        4. Cliquez sur <strong>Vérifier</strong>.
      </section>
      <div class="cw-toolbar">
        <button class="cw-button" type="button" onclick="checkAll()">Vérifier tout</button>
        <button class="cw-button secondary" type="button" onclick="resetAll()">Recommencer</button>
      </div>
      <div id="exercises"></div>
    </main>
    <div id="footer-slot"></div>
  </div>
  <script src="../js/score.js"></script>
  <script src="../js/exercises-config.js"></script>
  <script src="../js/stages.js"></script>
  <script src="../js/exercise-utils.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/ui.js"></script>
  <script>
  'use strict';
  const PAGE_ID='copier-mots';
  const STORAGE_KEY='copyMultipleWords20';
  const DONE_KEY='copyMultipleWords20Done';
  const exercises=[
    {text:"Bonjour je m'appelle Maria",target:"Maria",instruction:"Copiez le prénom."},
    {text:"J'habite à Vevey en Suisse",target:"Vevey Suisse",instruction:"Copiez la ville et le pays."},
    {text:"Je cherche un emploi dans le nettoyage",target:"emploi nettoyage",instruction:"Copiez le type de recherche et le domaine."},
    {text:"Je suis disponible lundi matin",target:"lundi matin",instruction:"Copiez le jour et le moment."},
    {text:"Je parle français et portugais",target:"français portugais",instruction:"Copiez les deux langues."},
    {text:"Mon téléphone est 076 123 45 67",target:"076 123 45 67",instruction:"Copiez le numéro de téléphone."},
    {text:"Je suis motivé sérieux et ponctuel",target:"motivé sérieux ponctuel",instruction:"Copiez les trois qualités."},
    {text:"Je prends le train à Lausanne",target:"train Lausanne",instruction:"Copiez le transport et la ville."},
    {text:"J'ai rendez-vous mardi à 10 heures",target:"mardi 10 heures",instruction:"Copiez le jour et l'heure."},
    {text:"Je cherche une place d'apprentissage dans la vente",target:"place d'apprentissage vente",instruction:"Copiez la recherche et le domaine."},
    {text:"Je travaille le matin et l'après-midi",target:"matin l'après-midi",instruction:"Copiez les moments de la journée."},
    {text:"Merci pour votre réponse rapide",target:"Merci réponse",instruction:"Copiez le remerciement et le mot important."},
    {text:"Je reste à votre disposition",target:"votre disposition",instruction:"Copiez les deux derniers mots."},
    {text:"Voici mon curriculum vitae",target:"curriculum vitae",instruction:"Copiez les mots du CV."},
    {text:"Madame Monsieur je vous écris",target:"Madame Monsieur",instruction:"Copiez les formules de politesse."},
    {text:"Je peux commencer rapidement",target:"commencer rapidement",instruction:"Copiez l'action et le moment."},
    {text:"Je suis inscrit au chômage",target:"inscrit chômage",instruction:"Copiez les mots administratifs."},
    {text:"Je postule comme aide de cuisine",target:"aide cuisine",instruction:"Copiez le métier."},
    {text:"Je suis disponible le mardi et le jeudi",target:"mardi jeudi",instruction:"Copiez les deux jours."},
    {text:"Avec mes meilleures salutations",target:"meilleures salutations",instruction:"Copiez la formule de fin."}
  ];
  const container=document.getElementById('exercises');
  function escapeHtml(value){return String(value).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
  function readDone(){try{return JSON.parse(localStorage.getItem(DONE_KEY)||'[]')}catch(e){return[]}}
  function saveDone(done){localStorage.setItem(DONE_KEY,JSON.stringify(done));}
  exercises.forEach((ex,i)=>{
    const div=document.createElement('section');
    div.className='cw-exercise';
    div.innerHTML=`<h2>Exercice ${i+1}</h2><p class="cw-instruction">${escapeHtml(ex.instruction)} <span class="cw-target">Réponse attendue : ${escapeHtml(ex.target)}</span></p><div class="cw-source">${escapeHtml(ex.text)}</div><textarea class="cw-answer" id="a-${i}" placeholder="Collez ici..."></textarea><div class="cw-toolbar" style="margin-top:10px;margin-bottom:0"><button class="cw-button" type="button" onclick="checkOne(${i})">Vérifier</button><button class="cw-button secondary" type="button" onclick="clearOne(${i})">Effacer</button></div><div class="cw-result" id="r-${i}"></div><div class="cw-hint">Astuce : sélectionnez seulement les mots demandés, même s’ils ne sont pas toujours côte à côte.</div>`;
    container.appendChild(div);
  });
  function normWords(text){return text.toLowerCase().replace(/[.,;:!?]/g,'').trim().split(/\s+/).filter(Boolean);}
  function checkOne(i){
    const textarea=document.getElementById(`a-${i}`);
    const userWords=normWords(textarea.value);
    const expectedWords=normWords(exercises[i].target);
    const result=document.getElementById(`r-${i}`);
    const userSorted=[...userWords].sort().join('|');
    const expectedSorted=[...expectedWords].sort().join('|');
    textarea.classList.remove('correct','wrong');
    if(userSorted===expectedSorted){
      result.textContent='Correct';
      result.className='cw-result ok';
      textarea.classList.add('correct');
      const done=readDone();
      if(!done[i]&&window.ScoreManager){
        window.ScoreManager.updateMetrics(PAGE_ID,{correct:1,typed:1,xp:3});
        window.ScoreManager.promoteStatus(PAGE_ID,done.filter(Boolean).length+1>=exercises.length?'completed':'in_progress');
      }
      done[i]=true;saveDone(done);
    }else{
      if(userWords.length===0)result.textContent="Rien n'est collé.";
      else if(userWords.length<expectedWords.length)result.textContent='Il manque un mot.';
      else if(userWords.length>expectedWords.length)result.textContent='Il y a trop de mots.';
      else result.textContent='Mauvais mots.';
      result.className='cw-result no';
      textarea.classList.add('wrong');
      if(window.ScoreManager)window.ScoreManager.updateMetrics(PAGE_ID,{errors:1,typed:1});
    }
    save();
  }
  function checkAll(){exercises.forEach((_,i)=>checkOne(i));}
  function clearOne(i){const textarea=document.getElementById(`a-${i}`);textarea.value='';textarea.classList.remove('correct','wrong');document.getElementById(`r-${i}`).textContent='';save();}
  function resetAll(){if(!confirm('Effacer toutes les réponses ?'))return;localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(DONE_KEY);location.reload();}
  function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(exercises.map((_,i)=>document.getElementById(`a-${i}`).value)));}
  function load(){try{const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');data.forEach((value,i)=>{const textarea=document.getElementById(`a-${i}`);if(textarea)textarea.value=value;});}catch(e){}}
  load();
  document.addEventListener('input',save);
  if(window.ScoreManager)window.ScoreManager.promoteStatus(PAGE_ID,'in_progress');
  console.assert(exercises.length===20,'20 exercices copier-mots');
  </script>
</body>
</html>
