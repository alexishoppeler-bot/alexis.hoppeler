<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulaire métier - AH</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages/vocabulaire-metier.css">
</head>
<body>
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="layout">
    <main class="main">
      <div class="container">

        <div class="page-header fade-up">
          <div class="page-icon">💬</div>
          <h1>Vocabulaire métier</h1>
          <p>Choisissez le bon verbe conjugué dans des phrases de travail.</p>
        </div>

        <section class="vocab-game fade-up delay-2" aria-label="Jeu de vocabulaire métier">
          <div class="vocab-panel">
            <div class="vocab-field">
              <label for="jobSelect">Métier</label>
              <select id="jobSelect"></select>
            </div>
            <div class="vocab-field">
              <label for="seriesSelect">Série</label>
              <select id="seriesSelect">
                <option value="10">10 phrases</option>
                <option value="20">20 phrases</option>
                <option value="50">50 phrases</option>
              </select>
            </div>
            <div class="vocab-field vocab-field-wide">
              <div class="vocab-filter-label">Mode pédagogique</div>
              <div class="vocab-tense-controls" id="modeControls"></div>
            </div>
          </div>

          <div class="vocab-help" id="helpPanel" aria-label="Aide sur les temps"></div>

          <div class="vocab-progress-panel" aria-label="Progression par métier">
            <div class="vocab-progress-title">Progression par métier</div>
            <div class="vocab-progress-grid" id="jobProgressGrid"></div>
          </div>

          <div class="vocab-exercise">
            <div class="vocab-top">
              <div class="vocab-status">
                <span><strong id="seriesTitle">Nettoyage</strong> - <span id="seriesCount">50 phrases</span></span>
                <span id="seriesTense">Tous les temps</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
              <div class="vocab-counters">
                <span>Complétées <strong id="liveAnswered">0</strong></span>
                <span>Correctes <strong id="liveCorrect">0</strong></span>
                <span>Erreurs <strong id="liveErrors">0</strong></span>
                <span>XP <strong id="liveXP">0</strong></span>
              </div>
            </div>

            <div class="phrase-list" id="phraseList"></div>

            <div class="action-row">
              <button class="btn btn-primary" id="btnCheck" type="button">Vérifier la série</button>
              <button class="btn btn-secondary" id="btnReset" type="button">Effacer les réponses</button>
              <button class="btn btn-secondary" id="btnReviewErrors" type="button" hidden>Voir seulement mes erreurs</button>
            </div>
          </div>

          <div class="vocab-results" id="resultZone">
            <h2 id="resultTitle">Résultat</h2>
            <p id="resultText"></p>
            <div class="kpi-grid">
              <div class="kpi-card">
                <div class="kpi-value" id="resCorrect">0</div>
                <div class="kpi-label">Correctes</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-value" id="resErrors">0</div>
                <div class="kpi-label">Erreurs</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-value" id="resXP">0</div>
                <div class="kpi-label">XP</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-value" id="resAccuracy">-</div>
                <div class="kpi-label">Précision</div>
              </div>
            </div>
            <div class="action-row">
              <a href="#" class="btn btn-primary btn-lg" id="btnNextExercise">Exercice suivant</a>
              <a href="accueil.html" class="btn btn-secondary btn-lg">Accueil</a>
            </div>
          </div>
        </section>

      </div>
    </main>
    <div id="footer-slot"></div>
  </div>

vendre|les derniers articles en promotion.
`)
    }
  ];

  let state = {
    jobId: JOB_DATA[0].id,
    modeId: 'present-n1',
    seriesSize: 10,
    checked: false,
    reviewOnly: false,
    reviewItems: [],
    last: { correct: 0, errors: 0, typed: 0, xp: 0 }
  };

  function makeItems(raw) {
    return raw.trim().split('\n').map((line, index) => {
      const parts = line.split('|');
      return {
        index,
        verb: parts[0].trim(),
        complement: parts[1].trim(),
        tense: TENSE_ORDER[index % TENSE_ORDER.length]
      };
    });
  }

  function shuffle(arr) {
    const copy = arr.slice();
    for (let i = copy.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function getJob() {
    return JOB_DATA.find((job) => job.id === state.jobId) || JOB_DATA[0];
  }

  function getMode() {
    return MODES.find((mode) => mode.id === state.modeId) || MODES[0];
  }

  function visibleItems() {
    const mode = getMode();
    if (state.reviewOnly) {
      return state.reviewItems.map((item) => Object.assign({}, item));
    }
    return getJob().items.slice(0, state.seriesSize).map((item, position) => (
      Object.assign({}, item, { tense: mode.tenses[position % mode.tenses.length] })
    ));
  }

  function conjugate(verb, tense) {
    const forms = VERBS[verb];
    if (!forms) return verb;
    if (tense === 'present') return forms[0];
    if (tense === 'imparfait') return forms[1];
    if (tense === 'passe-compose') return 'ai ' + forms[2];
    if (tense === 'passe-recent') return 'viens de ' + verb;
    if (tense === 'futur-proche') return 'vais ' + verb;
    if (tense === 'futur-simple') return forms[3];
    return forms[0];
  }

  function uniqueValues(values) {
    return values.filter((value, index, arr) => value && arr.indexOf(value) === index);
  }

  function mistakeFor(verb, tense) {
    const forms = VERBS[verb];
    if (!forms) return '';
    if (tense === 'present') return verb;
    if (tense === 'imparfait') return forms[0];
    if (tense === 'passe-compose') return forms[2];
    if (tense === 'passe-recent') return 'viens ' + verb;
    if (tense === 'futur-proche') return 'va ' + verb;
    if (tense === 'futur-simple') return 'vais ' + verb;
    return '';
  }

  function choicesFor(item) {
    const job = getJob();
    const verbs = Array.from(new Set(job.items.map((entry) => entry.verb)))
      .filter((verb) => verb !== item.verb);
    const sameVerbWrongTenses = TENSE_ORDER
      .filter((tense) => tense !== item.tense)
      .map((tense) => conjugate(item.verb, tense));
    const sameTenseOtherVerbs = shuffle(verbs)
      .slice(0, 6)
      .map((verb) => conjugate(verb, item.tense));
    const candidates = uniqueValues([
      conjugate(item.verb, item.tense),
      mistakeFor(item.verb, item.tense),
      ...sameVerbWrongTenses,
      ...sameTenseOtherVerbs
    ]);
    return shuffle(candidates.slice(0, 5));
  }

  function subjectPrefix(form) {
    return /^[aeiouyàâéèêëîïôùûü]/i.test(form) ? "J'" : 'Je ';
  }

  function fullSentence(item) {
    const answer = conjugate(item.verb, item.tense);
    return subjectPrefix(answer) + answer + ' ' + item.complement;
  }

  function phraseHtml(item, optionsHtml) {
    const answer = conjugate(item.verb, item.tense);
    return [
      escapeHtml(subjectPrefix(answer)),
      '<select class="verb-select" aria-label="Choisir le verbe dans la phrase">',
      '  <option value="">choisir...</option>',
      optionsHtml,
      '</select>',
      ' ',
      escapeHtml(item.complement)
    ].join('');
  }

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    }[char]));
  }

  function notify(message, type) {
    if (typeof showToast === 'function') {
      showToast(message, type || 'info');
    }
  }

  function safeAccuracy(correct, typed) {
    if (typeof calcAccuracy === 'function') return calcAccuracy(correct, typed);
    return typed ? Math.round((correct / typed) * 100) : 0;
  }

  function safeRecordProgress(delta) {
    if (typeof recordExerciseProgress === 'function') {
      recordExerciseProgress(PAGE_ID, delta);
    }
  }

  function safePromoteStatus(status) {
    if (typeof promoteExerciseStatus === 'function') {
      promoteExerciseStatus(PAGE_ID, status);
    }
  }

  function safeConfetti() {
    if (typeof launchConfetti === 'function') launchConfetti();
  }

  function readProgress() {
    try {
      const parsed = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch (e) {
      return {};
    }
  }

  function writeProgress(progress) {
    try {
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
    } catch (e) {}
  }

  function updateJobProgress(correctIndexes) {
    const progress = readProgress();
    const current = progress[state.jobId] && typeof progress[state.jobId] === 'object'
      ? progress[state.jobId]
      : { correct: [] };
    const known = new Set(Array.isArray(current.correct) ? current.correct : []);
    correctIndexes.forEach((index) => known.add(index));
    progress[state.jobId] = { correct: Array.from(known).sort((a, b) => a - b) };
    writeProgress(progress);
    renderJobProgress();
    return progress[state.jobId].correct.length;
  }

  function renderJobProgress() {
    const progress = readProgress();
    const grid = document.getElementById('jobProgressGrid');
    if (!grid) return;
    grid.innerHTML = JOB_DATA.map((job) => {
      const correct = progress[job.id] && Array.isArray(progress[job.id].correct)
        ? progress[job.id].correct.length
        : 0;
      const pct = Math.round((correct / job.items.length) * 100);
      return [
        '<div class="job-progress-card">',
        '  <div class="job-progress-row">',
        '    <strong>' + escapeHtml(job.label) + '</strong>',
        '    <span>' + (correct === job.items.length ? 'Terminé' : correct + '/' + job.items.length) + '</span>',
        '  </div>',
        '  <div class="progress-bar"><div class="progress-fill green" style="width:' + pct + '%"></div></div>',
        '</div>'
      ].join('');
    }).join('');
  }

  function renderHelp() {
    const mode = getMode();
    const panel = document.getElementById('helpPanel');
    const examples = TENSES.map((tenseInfo) => {
      const tense = tenseInfo.id;
      const item = { verb: 'nettoyer', tense, complement: 'la salle.' };
      return '<span class="' + (mode.tenses.includes(tense) ? 'active' : '') + '"><strong>' + escapeHtml(TENSE_LABELS[tense]) + '</strong> : ' + escapeHtml(fullSentence(item)) + '</span>';
    }).join('');
    panel.innerHTML = [
      '<div class="vocab-help-title">Aide avant l’exercice</div>',
      '<div class="vocab-help-examples">',
      examples,
      '</div>'
    ].join('');
  }

  function renderControls() {
    const jobSelect = document.getElementById('jobSelect');
    jobSelect.innerHTML = JOB_DATA.map((job) => (
      '<option value="' + escapeHtml(job.id) + '">' + escapeHtml(job.label) + ' - 50 phrases</option>'
    )).join('');
    jobSelect.value = state.jobId;

    const seriesSelect = document.getElementById('seriesSelect');
    seriesSelect.value = String(state.seriesSize);

    const modeControls = document.getElementById('modeControls');
    modeControls.innerHTML = MODES.map((mode) => (
      '<button class="tense-button' + (mode.id === state.modeId ? ' active' : '') + '" type="button" data-mode="' + mode.id + '">' +
        escapeHtml(mode.label) +
      '</button>'
    )).join('');
    renderHelp();
    renderJobProgress();
  }

  function renderPhrases() {
    const items = visibleItems();
    const host = document.getElementById('phraseList');
    const job = getJob();
    const mode = getMode();
    document.getElementById('seriesTitle').textContent = job.label;
    document.getElementById('seriesCount').textContent = items.length + (items.length > 1 ? ' phrases' : ' phrase');
    document.getElementById('seriesTense').textContent = state.reviewOnly ? 'Reprise des erreurs' : mode.label;
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('liveAnswered').textContent = '0';
    document.getElementById('liveCorrect').textContent = state.last.correct;
    document.getElementById('liveErrors').textContent = state.last.errors;
    document.getElementById('liveXP').textContent = state.last.xp;
    document.getElementById('resultZone').classList.remove('show');
    document.getElementById('btnCheck').disabled = false;
    document.getElementById('btnReviewErrors').hidden = true;

    host.innerHTML = items.map((item, visibleIndex) => {
      const options = choicesFor(item).map((choice) => (
        '<option value="' + escapeHtml(choice) + '">' + escapeHtml(choice) + '</option>'
      )).join('');
      return [
        '<article class="phrase-card" data-index="' + item.index + '">',
        '  <div class="phrase-main">',
        '    <div class="phrase-meta">',
        '      <span class="phrase-number">' + (visibleIndex + 1) + '</span>',
        '      <span class="phrase-tense">' + escapeHtml(TENSE_LABELS[item.tense]) + '</span>',
        '    </div>',
        '    <div class="phrase-text">' + phraseHtml(item, options) + '</div>',
        '    <div class="phrase-feedback" aria-live="polite"></div>',
        '  </div>',
        '</article>'
      ].join('');
    }).join('');

    document.querySelectorAll('.verb-select').forEach((select) => {
      select.addEventListener('change', updateLiveProgress);
    });
  }

  function updateLiveProgress() {
    const total = document.querySelectorAll('.verb-select').length;
    const answered = Array.from(document.querySelectorAll('.verb-select'))
      .filter((select) => select.value).length;
    const pct = total ? Math.round((answered / total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('liveAnswered').textContent = answered;
  }

  function checkAnswers() {
    if (state.checked) {
      notify('Cette série est déjà vérifiée. Effacez les réponses pour recommencer.', 'info');
      return;
    }

    const items = visibleItems();
    let typed = 0;
    let correct = 0;
    let errors = 0;
    const correctIndexes = [];
    const errorItems = [];

    document.querySelectorAll('.phrase-card').forEach((card) => {
      const itemIndex = Number(card.getAttribute('data-index'));
      const item = items.find((entry) => entry.index === itemIndex);
      const select = card.querySelector('.verb-select');
      const feedback = card.querySelector('.phrase-feedback');
      const selected = select.value;
      const answer = conjugate(item.verb, item.tense);

      card.classList.remove('correct', 'wrong');
      if (!selected) {
        feedback.textContent = 'Phrase non complétée.';
        return;
      }

      typed += 1;
      if (selected === answer) {
        correct += 1;
        correctIndexes.push(item.index);
        card.classList.add('correct');
        feedback.textContent = 'Correct.';
      } else {
        errors += 1;
        errorItems.push(Object.assign({}, item));
        card.classList.add('wrong');
        feedback.textContent = 'Correction : ' + fullSentence(item);
      }
    });

    if (!typed) {
      document.getElementById('resultTitle').textContent = 'Choisissez une réponse';
      document.getElementById('resultText').textContent = 'Sélectionnez au moins un verbe dans la série, puis cliquez sur Vérifier.';
      document.getElementById('resultZone').classList.add('show');
      notify('Choisissez au moins un verbe.', 'info');
      return;
    }

    const xp = correct * 3;
    const accuracy = safeAccuracy(correct, typed);
    const jobCorrectTotal = updateJobProgress(correctIndexes);
    state.checked = true;
    state.reviewItems = errorItems.slice();
    state.last = { correct, errors, typed, xp };
    document.getElementById('btnCheck').disabled = true;
    document.querySelectorAll('.verb-select').forEach((select) => {
      select.disabled = true;
    });

    document.getElementById('liveCorrect').textContent = correct;
    document.getElementById('liveErrors').textContent = errors;
    document.getElementById('liveXP').textContent = xp;
    document.getElementById('resCorrect').textContent = correct;
    document.getElementById('resErrors').textContent = errors;
    document.getElementById('resXP').textContent = xp;
    document.getElementById('resAccuracy').textContent = accuracy + '%';
    document.getElementById('resultTitle').textContent = accuracy >= 80 ? 'Très bon travail' : 'Série vérifiée';
    document.getElementById('resultText').textContent = 'Vous avez répondu à ' + typed + ' phrase' + (typed > 1 ? 's' : '') + '. Progression ' + getJob().label + ' : ' + jobCorrectTotal + '/50.';
    document.getElementById('resultZone').classList.add('show');
    document.getElementById('btnReviewErrors').hidden = errorItems.length === 0;

    safeRecordProgress({ correct, typed, errors, xp });
    if (jobCorrectTotal >= getJob().items.length) {
      safePromoteStatus('completed');
    } else {
      safePromoteStatus('in_progress');
    }
    if (accuracy >= 80 && typed === items.length) safeConfetti();
    notify('Série vérifiée : ' + correct + ' correcte' + (correct > 1 ? 's' : '') + ', +' + xp + ' XP', 'success');
  }

  function resetAnswers() {
    document.querySelectorAll('.phrase-card').forEach((card) => {
      card.classList.remove('correct', 'wrong');
      card.querySelector('.verb-select').value = '';
      card.querySelector('.phrase-feedback').textContent = '';
    });
    state.checked = false;
    state.last = { correct: 0, errors: 0, typed: 0, xp: 0 };
    document.getElementById('liveCorrect').textContent = '0';
    document.getElementById('liveErrors').textContent = '0';
    document.getElementById('liveXP').textContent = '0';
    document.getElementById('resultZone').classList.remove('show');
    document.getElementById('btnCheck').disabled = false;
    document.getElementById('btnReviewErrors').hidden = true;
    document.querySelectorAll('.verb-select').forEach((select) => {
      select.disabled = false;
    });
    updateLiveProgress();
  }

  function changeJob(jobId) {
    state.jobId = jobId;
    state.checked = false;
    state.reviewOnly = false;
    state.reviewItems = [];
    state.last = { correct: 0, errors: 0, typed: 0, xp: 0 };
    renderControls();
    renderPhrases();
  }

  function changeMode(modeId) {
    state.modeId = modeId;
    state.checked = false;
    state.reviewOnly = false;
    state.reviewItems = [];
    state.last = { correct: 0, errors: 0, typed: 0, xp: 0 };
    renderControls();
    renderPhrases();
  }

  function changeSeriesSize(size) {
    state.seriesSize = SERIES_SIZES.includes(size) ? size : 10;
    state.checked = false;
    state.reviewOnly = false;
    state.reviewItems = [];
    state.last = { correct: 0, errors: 0, typed: 0, xp: 0 };
    renderControls();
    renderPhrases();
  }

  function reviewErrors() {
    if (!state.reviewItems.length) return;
    state.reviewOnly = true;
    state.checked = false;
    state.last = { correct: 0, errors: 0, typed: 0, xp: 0 };
    renderControls();
    renderPhrases();
    notify('Reprise des erreurs uniquement.', 'info');
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderControls();
    renderPhrases();
    if (typeof setupNextExerciseButton === 'function') {
      setupNextExerciseButton(PAGE_ID);
    }

    document.getElementById('jobSelect').addEventListener('change', (event) => {
      changeJob(event.target.value);
    });

    document.getElementById('seriesSelect').addEventListener('change', (event) => {
      changeSeriesSize(Number(event.target.value));
    });

    document.getElementById('modeControls').addEventListener('click', (event) => {
      const button = event.target.closest('.tense-button');
      if (!button) return;
      changeMode(button.getAttribute('data-mode'));
    });

    document.getElementById('btnCheck').addEventListener('click', checkAnswers);
    document.getElementById('btnReset').addEventListener('click', resetAnswers);
    document.getElementById('btnReviewErrors').addEventListener('click', reviewErrors);
  });
  </script>
</body>
</html>
